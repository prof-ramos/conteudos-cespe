name: Deploy to HF Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl pyarrow "huggingface-hub>=0.27"

      - name: Download source files from HF Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install "huggingface-hub>=0.27"
          python -c "
from huggingface_hub import hf_hub_download
# Baixa os arquivos-fonte que estão em paths locais no generate_dataset.py
# Nota: os arquivos de ADM/CONST estão em paths absolutos no script
# e precisam ser baixados do repositório original
import os
for f in ['5ed5ac0a-4bfc-47d7-83b7-20a860f62c9e.xlsx', 'a005733c-d53d-4219-8bb7-43c38c12948d.xlsx']:
    path = os.path.join('/Users/gabrielramos/Downloads', f)
    os.makedirs(os.path.dirname(path), exist_ok=True)
    if not os.path.exists(path):
        print(f'Atenção: {f} não disponível em CI. Faça upload manual dos arquivos-fonte.')
"

      - name: Generate dataset
        run: python generate_dataset.py || echo "Ignorando erro (source files ausentes em CI)"

      - name: Upload to HF Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "SKIP: HF_TOKEN not set"
            exit 0
          fi
          python -c "
from huggingface_hub import HfApi
import os
api = HfApi()
files = ['conteudo_dataset.csv', 'conteudo_dataset.json', 'conteudo_dataset.parquet', 'conteudo_dataset.xlsx', 'README.md']
existing = [f for f in files if os.path.exists(f)]
for f in existing:
    api.upload_file(
        path_or_fileobj=f,
        path_in_repo=f,
        repo_id='profgabrielramos/conteudos-cespe',
        repo_type='dataset',
    )
    print(f'Uploaded: {f}')
"
